<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
    <h1><f:translate key="LLL:EXT:t3_cowriter/Resources/Private/Language/locallang_mod_status.xlf:status.title" /></h1>

    <p class="mb-4">
        <f:translate key="LLL:EXT:t3_cowriter/Resources/Private/Language/locallang_mod_status.xlf:status.description" />
    </p>

    <f:if condition="{result.ok}">
        <f:then>
            <div class="callout callout-success">
                <div class="callout-body">
                    <h4 class="callout-title"><f:translate key="LLL:EXT:t3_cowriter/Resources/Private/Language/locallang_mod_status.xlf:status.ready.title" /></h4>
                    <p><f:translate key="LLL:EXT:t3_cowriter/Resources/Private/Language/locallang_mod_status.xlf:status.ready.description" /></p>
                </div>
            </div>
        </f:then>
        <f:else>
            <div class="callout callout-danger">
                <div class="callout-body">
                    <h4 class="callout-title"><f:translate key="LLL:EXT:t3_cowriter/Resources/Private/Language/locallang_mod_status.xlf:status.incomplete.title" /></h4>
                    <p><f:translate key="LLL:EXT:t3_cowriter/Resources/Private/Language/locallang_mod_status.xlf:status.incomplete.description" /></p>
                </div>
            </div>
        </f:else>
    </f:if>

    <div class="table-fit mt-4">
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th class="col-icon"></th>
                    <th><f:translate key="LLL:EXT:t3_cowriter/Resources/Private/Language/locallang_mod_status.xlf:status.table.check" /></th>
                    <th><f:translate key="LLL:EXT:t3_cowriter/Resources/Private/Language/locallang_mod_status.xlf:status.table.status" /></th>
                    <th class="col-control"></th>
                </tr>
            </thead>
            <tbody>
                <f:for each="{checks}" as="check">
                    <tr>
                        <td>
                            <f:if condition="{check.passed}">
                                <f:then>
                                    <span class="text-success">
                                        <core:icon identifier="actions-check" size="small" />
                                    </span>
                                </f:then>
                                <f:else>
                                    <span class="text-danger">
                                        <core:icon identifier="actions-close" size="small" />
                                    </span>
                                </f:else>
                            </f:if>
                        </td>
                        <td>
                            <strong class="d-block">{check.title}</strong>
                            <span class="text-body-secondary small font-monospace">{check.key}</span>
                        </td>
                        <td>
                            <f:if condition="{check.passed}">
                                <f:then>
                                    <span class="badge badge-success me-2"><f:translate key="LLL:EXT:t3_cowriter/Resources/Private/Language/locallang_mod_status.xlf:status.badge.ready" /></span>
                                </f:then>
                                <f:else>
                                    <span class="badge badge-danger me-2"><f:translate key="LLL:EXT:t3_cowriter/Resources/Private/Language/locallang_mod_status.xlf:status.badge.needsSetup" /></span>
                                </f:else>
                            </f:if>
                            <span>{check.message}</span>
                        </td>
                        <td class="col-control">
                            <f:if condition="{check.fixRoute}">
                                <f:if condition="{fixUrls.{check.fixRoute}}">
                                    <a href="{fixUrls.{check.fixRoute}}"
                                       class="btn btn-default">
                                        <core:icon identifier="actions-cog" size="small" />
                                        <f:translate key="LLL:EXT:t3_cowriter/Resources/Private/Language/locallang_mod_status.xlf:status.action.fix" />
                                    </a>
                                </f:if>
                            </f:if>
                        </td>
                    </tr>
                </f:for>
            </tbody>
        </table>
    </div>

    <div class="mt-4">
        <p class="text-body-secondary">
            <f:translate key="LLL:EXT:t3_cowriter/Resources/Private/Language/locallang_mod_status.xlf:status.footer.hint" />
        </p>
    </div>
</f:section>

</html>
